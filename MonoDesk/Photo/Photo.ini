[Rainmeter]
; Foto polos yang "ditempel" di layar - tanpa bingkai, tab, atau teks apa pun.
; Update ringan: siklus 5 detik (foto berganti otomatis tiap 30 detik).
Update=5000
AccurateText=1
DynamicWindowSize=1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]

[Metadata]
Name=MonoDesk Photo
Author=Rasyihan
Information=Foto polos tertempel di layar. Klik = ganti foto. Klik tengah = buka folder foto.
Version=2.1

[Variables]
@include=#@#Variables.inc
; ================================================================
; ATUR UKURAN FOTO DI SINI (langsung dalam piksel)
; LebarFoto  : lebar tampilan foto di layar
; TinggiFoto : tinggi tampilan foto di layar
; Scale      : zoom keseluruhan (scroll mouse di foto juga bisa)
; SudutBulat : kelengkungan sudut foto (0 = tajam, 14 = bulat lembut,
;              30 = sangat bulat). Jika foto tak muncul, set 0.
; ================================================================
LebarFoto=280
TinggiFoto=190
Scale=1.0
SudutBulat=14

;-------------------------------------------------------------
; MEASURE - pilih file foto acak dari folder Photos
;-------------------------------------------------------------

[MeasurePhoto]
Measure=Plugin
Plugin=QuotePlugin
PathName=#@#Photos
FileFilter=*.png;*.jpg;*.jpeg;*.bmp;*.gif
Subfolders=0
UpdateDivider=6

;-------------------------------------------------------------
; METERS - foto dengan sudut membulat
; PENTING: meter masker (MeterPhotoMask) WAJIB ditulis SETELAH
; meter fotonya - aturan fitur Container Rainmeter.
;-------------------------------------------------------------

[MeterPhoto]
Meter=Image
MeasureName=MeasurePhoto
Container=MeterPhotoMask
X=0
Y=0
W=(#LebarFoto#*#Scale#)
H=(#TinggiFoto#*#Scale#)
PreserveAspectRatio=2
ToolTipText=Klik: ganti foto | Klik tengah: buka folder
LeftMouseUpAction=[!UpdateMeasure MeasurePhoto][!UpdateMeter *][!Redraw]
MiddleMouseUpAction=["explorer.exe" "#@#Photos"]

[MeterPhotoMask]
Meter=Shape
X=0
Y=0
Shape=Rectangle 0,0,(#LebarFoto#*#Scale#),(#TinggiFoto#*#Scale#),(#SudutBulat#*#Scale#) | Fill Color 255,255,255,255 | StrokeWidth 0
UpdateDivider=-1
