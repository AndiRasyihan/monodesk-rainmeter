[Rainmeter]
; Update tiap 2 detik cukup untuk monitor sistem (hemat CPU);
; disk dicek tiap 30 detik (2000ms x UpdateDivider=15)
Update=2000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]

[Metadata]
Name=MonoDesk Stats
Author=Rasyihan
Information=Monitor CPU, RAM, dan disk. Scroll mouse untuk zoom.
Version=2.0

[Variables]
@include=#@#Variables.inc
; ================================================================
; ATUR UKURAN WIDGET SYSTEM/STATS DI SINI
; Scale       : zoom keseluruhan (scroll mouse di widget juga bisa)
; LebarSkala  : melebarkan/menyempitkan kotak (1.0 = normal, 1.3 = lebih lebar)
; TinggiSkala : meninggikan/memendekkan kotak (1.0 = normal, 1.3 = lebih tinggi)
; ================================================================
Scale=1.0
LebarSkala=1.0
TinggiSkala=1.0

;-------------------------------------------------------------
; MEASURES
;-------------------------------------------------------------

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=PhysicalMemory

[MeasureDiskCFree]
Measure=FreeDiskSpace
Drive=C:
UpdateDivider=15

[MeasureDiskCUsed]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1
UpdateDivider=15

[MeasureDiskDFree]
Measure=FreeDiskSpace
Drive=D:
UpdateDivider=15

[MeasureDiskDUsed]
Measure=FreeDiskSpace
Drive=D:
InvertMeasure=1
UpdateDivider=15

;-------------------------------------------------------------
; METERS - BINGKAI & JUDUL
;-------------------------------------------------------------

[MeterBox]
Meter=Shape
X=0
Y=(18*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(320*#Scale#*#LebarSkala#),(230*#Scale#*#TinggiSkala#),(12*#Scale#) | Fill Color #BoxColor# | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTab]
Meter=Shape
X=(20*#Scale#*#LebarSkala#)
Y=0
Shape=Rectangle 0,0,(110*#Scale#*#LebarSkala#),(36*#Scale#*#TinggiSkala#),(9*#Scale#) | Fill Color 8,8,8,255 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTitle]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(75*#Scale#*#LebarSkala#)
Y=(7*#Scale#*#TinggiSkala#)
Text="SYSTEM"
AntiAlias=1
UpdateDivider=-1

;-------------------------------------------------------------
; METERS - CPU
;-------------------------------------------------------------

[MeterCPULabel]
Meter=String
FontFace=#FontName#
FontWeight=600
FontColor=#FontColorDim#
FontSize=(12*#Scale#)
X=(25*#Scale#*#LebarSkala#)
Y=(56*#Scale#*#TinggiSkala#)
Text="CPU"
AntiAlias=1

[MeterCPUValue]
Meter=String
MeasureName=MeasureCPU
StringAlign=Right
FontFace=#FontName#
FontWeight=400
FontColor=#FontColor#
FontSize=(12*#Scale#)
X=(295*#Scale#*#LebarSkala#)
Y=(56*#Scale#*#TinggiSkala#)
Text="%1%"
Percentual=1
AntiAlias=1

[MeterCPUBar]
Meter=Bar
MeasureName=MeasureCPU
X=(25*#Scale#*#LebarSkala#)
Y=(80*#Scale#*#TinggiSkala#)
W=(270*#Scale#*#LebarSkala#)
H=(2*#Scale#)
BarColor=#FontColor#
SolidColor=255,255,255,40
BarOrientation=Horizontal

;-------------------------------------------------------------
; METERS - RAM
