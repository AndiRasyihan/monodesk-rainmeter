[MeterRAMLabel]
Meter=String
FontFace=#FontName#
FontWeight=600
FontColor=#FontColorDim#
FontSize=(12*#Scale#)
X=(25*#Scale#*#LebarSkala#)
Y=(100*#Scale#*#TinggiSkala#)
Text="RAM"
