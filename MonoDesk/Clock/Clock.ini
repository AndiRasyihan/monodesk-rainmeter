[Rainmeter]
; Update tiap 1 detik untuk jam; cuaca hanya diambil tiap 30 menit (UpdateRate)
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]

[Metadata]
Name=MonoDesk Clock
Author=Rasyihan
Information=Jam gaya widget Android (Pixel "At a Glance"): jam besar, tanggal, dan suhu cuaca. Klik jam untuk buka Alarm, klik tanggal untuk cuaca lengkap.
Version=1.0

[Variables]
@include=#@#Variables.inc
; ================================================================
; ATUR UKURAN WIDGET JAM DI SINI
; Scale       : zoom keseluruhan (scroll mouse di widget juga bisa)
; LebarSkala  : melebarkan/menyempitkan kotak (1.0 = normal, 1.3 = lebih lebar)
; TinggiSkala : meninggikan/memendekkan kotak (1.0 = normal, 1.3 = lebih tinggi)
; Kota        : kosongkan agar lokasi cuaca otomatis (deteksi IP),
;               atau isi nama kota, contoh: Kota=Makassar
; ================================================================
Scale=1.0
LebarSkala=1.0
TinggiSkala=1.0
Kota=

;-------------------------------------------------------------
; MEASURES
;-------------------------------------------------------------

[MeasureWaktu]
Measure=Time
Format=%H:%M

[MeasureTanggal]
; FormatLocale membuat nama hari/bulan berbahasa Indonesia
Measure=Time
Format=%A, %d %B
FormatLocale=id-ID

[MeasureCuaca]
; Suhu dari wttr.in (gratis, tanpa API key). Tampil "--" bila belum ada internet.
Measure=WebParser
URL=https://wttr.in/#Kota#?format=%t
RegExp=(?s)^\s*(.*?)\s*$
StringIndex=1
UpdateRate=1800
RegExpSubstitute=1
Substitute="^\+":"","^$":"--"

;-------------------------------------------------------------
; METERS - BINGKAI & JUDUL
;-------------------------------------------------------------

[MeterBox]
Meter=Shape
X=0
Y=(18*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(320*#Scale#*#LebarSkala#),(130*#Scale#*#TinggiSkala#),(12*#Scale#) | Fill Color #BoxColor# | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTab]
Meter=Shape
X=(20*#Scale#*#LebarSkala#)
Y=0
Shape=Rectangle 0,0,(80*#Scale#*#LebarSkala#),(36*#Scale#*#TinggiSkala#),(9*#Scale#) | Fill Color 8,8,8,255 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTitle]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(60*#Scale#*#LebarSkala#)
Y=(7*#Scale#*#TinggiSkala#)
Text="JAM"
AntiAlias=1
UpdateDivider=-1

;-------------------------------------------------------------
; METERS - JAM BESAR + TANGGAL & CUACA (gaya At a Glance)
;-------------------------------------------------------------

[MeterJam]
Meter=String
MeasureName=MeasureWaktu
StringAlign=Center
FontFace=#FontName#
FontWeight=300
FontColor=#FontColor#
FontSize=(40*#Scale#)
X=(160*#Scale#*#LebarSkala#)
Y=(36*#Scale#*#TinggiSkala#)
Text="%1"
AntiAlias=1
LeftMouseUpAction=["ms-clock:"]
ToolTipText=Buka Jam & Alarm

[MeterTanggalCuaca]
Meter=String
MeasureName=MeasureTanggal
MeasureName2=MeasureCuaca
StringAlign=Center
FontFace=#FontName#
FontWeight=400
FontColor=#FontColorDim#
FontSize=(12*#Scale#)
X=(160*#Scale#*#LebarSkala#)
Y=(102*#Scale#*#TinggiSkala#)
Text="%1  |  %2"
AntiAlias=1
LeftMouseUpAction=["https://wttr.in/#Kota#"]
ToolTipText=Lihat cuaca lengkap
MouseOverAction=[!SetOption MeterTanggalCuaca FontColor "255,255,255,255"][!UpdateMeter MeterTanggalCuaca][!Redraw]
MouseLeaveAction=[!SetOption MeterTanggalCuaca FontColor "#FontColorDim#"][!UpdateMeter MeterTanggalCuaca][!Redraw]
