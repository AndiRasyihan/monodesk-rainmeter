[Rainmeter]
; Update tiap 1 detik agar progress lagu ikut bergerak
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]

[Metadata]
Name=MonoDesk Music
Author=Rasyihan
Information=Widget pemutar musik gaya Android: judul lagu, artis, progress, dan tombol kontrol. Atur aplikasi pemutar di bagian Variables.
Version=1.0

[Variables]
@include=#@#Variables.inc
; ================================================================
; ATUR UKURAN WIDGET MUSIK DI SINI
; Scale       : zoom keseluruhan (scroll mouse di widget juga bisa)
; LebarSkala  : melebarkan/menyempitkan kotak (1.0 = normal, 1.3 = lebih lebar)
; TinggiSkala : meninggikan/memendekkan kotak (1.0 = normal, 1.3 = lebih tinggi)
; Pemutar     : aplikasi musik yang dikontrol. Pilihan bawaan:
;               Spotify, iTunes, WMP, Winamp, MediaMonkey, AIMP, CAD
;               (musik dari browser/YouTube butuh plugin WebNowPlaying)
; Catatan     : progress bar tidak tersedia untuk Spotify (batasan Rainmeter)
; ================================================================
Scale=1.0
LebarSkala=1.0
TinggiSkala=1.0
Pemutar=Spotify

;-------------------------------------------------------------
; MEASURES
;-------------------------------------------------------------

[MeasureJudul]
Measure=NowPlaying
PlayerName=#Pemutar#
PlayerType=Title
RegExpSubstitute=1
Substitute="^$":"Tidak ada lagu"

[MeasurePenyanyi]
Measure=NowPlaying
PlayerName=[MeasureJudul]
PlayerType=Artist
RegExpSubstitute=1
Substitute="^$":"putar musik dulu di #Pemutar#..."

[MeasureProgress]
Measure=NowPlaying
PlayerName=[MeasureJudul]
PlayerType=Progress

[MeasureState]
; 0=berhenti, 1=main, 2=jeda -> ganti ikon tombol play/pause
Measure=NowPlaying
PlayerName=[MeasureJudul]
PlayerType=State
IfCondition=MeasureState=1
IfTrueAction=[!SetOption MeterPlay Text "||"][!UpdateMeter MeterPlay][!Redraw]
IfFalseAction=[!SetOption MeterPlay Text ">"][!UpdateMeter MeterPlay][!Redraw]

;-------------------------------------------------------------
; METERS - BINGKAI & JUDUL
;-------------------------------------------------------------

[MeterBox]
Meter=Shape
X=0
Y=(18*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(320*#Scale#*#LebarSkala#),(140*#Scale#*#TinggiSkala#),(12*#Scale#) | Fill Color #BoxColor# | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTab]
Meter=Shape
X=(20*#Scale#*#LebarSkala#)
Y=0
Shape=Rectangle 0,0,(100*#Scale#*#LebarSkala#),(36*#Scale#*#TinggiSkala#),(9*#Scale#) | Fill Color 8,8,8,255 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTitle]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(70*#Scale#*#LebarSkala#)
Y=(7*#Scale#*#TinggiSkala#)
Text="MUSIK"
AntiAlias=1
UpdateDivider=-1

;-------------------------------------------------------------
; METERS - INFO LAGU
;-------------------------------------------------------------

[MeterJudulLagu]
Meter=String
MeasureName=MeasureJudul
FontFace=#FontName#
FontWeight=600
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(25*#Scale#*#LebarSkala#)
Y=(50*#Scale#*#TinggiSkala#)
W=(270*#Scale#*#LebarSkala#)
ClipString=1
Text="%1"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureJudul "OpenPlayer"]
ToolTipText=Buka pemutar musik

[MeterArtis]
Meter=String
MeasureName=MeasurePenyanyi
FontFace=#FontName#
FontWeight=400
FontColor=#FontColorDim#
FontSize=(11*#Scale#)
X=(25*#Scale#*#LebarSkala#)
Y=(76*#Scale#*#TinggiSkala#)
W=(270*#Scale#*#LebarSkala#)
ClipString=1
Text="%1"
AntiAlias=1

[MeterProgressBar]
Meter=Bar
MeasureName=MeasureProgress
X=(25*#Scale#*#LebarSkala#)
Y=(100*#Scale#*#TinggiSkala#)
W=(270*#Scale#*#LebarSkala#)
H=(2*#Scale#)
BarColor=#FontColor#
SolidColor=255,255,255,40
BarOrientation=Horizontal

;-------------------------------------------------------------
; METERS - TOMBOL KONTROL (klik: <<  >  >>)
;-------------------------------------------------------------

[MeterPrev]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColorDim#
FontSize=(14*#Scale#)
X=(105*#Scale#*#LebarSkala#)
Y=(110*#Scale#*#TinggiSkala#)
Text="<<"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureJudul "Previous"]
ToolTipText=Lagu sebelumnya
MouseOverAction=[!SetOption MeterPrev FontColor "255,255,255,255"][!UpdateMeter MeterPrev][!Redraw]
MouseLeaveAction=[!SetOption MeterPrev FontColor "#FontColorDim#"][!UpdateMeter MeterPrev][!Redraw]

[MeterPlay]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(14*#Scale#)
X=(160*#Scale#*#LebarSkala#)
Y=(110*#Scale#*#TinggiSkala#)
Text=">"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureJudul "PlayPause"]
ToolTipText=Putar / jeda

[MeterNext]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColorDim#
FontSize=(14*#Scale#)
X=(215*#Scale#*#LebarSkala#)
Y=(110*#Scale#*#TinggiSkala#)
Text=">>"
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureJudul "Next"]
ToolTipText=Lagu berikutnya
MouseOverAction=[!SetOption MeterNext FontColor "255,255,255,255"][!UpdateMeter MeterNext][!Redraw]
MouseLeaveAction=[!SetOption MeterNext FontColor "#FontColorDim#"][!UpdateMeter MeterNext][!Redraw]
