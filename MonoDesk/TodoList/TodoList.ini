IfCondition=MeasureDone4 = 1
IfTrueAction=[!SetOption MeterCheck4 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 255,255,255,235 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo4 FontColor "255,255,255,80"][!UpdateMeter MeterCheck4][!UpdateMeter MeterTodo4][!Redraw]
