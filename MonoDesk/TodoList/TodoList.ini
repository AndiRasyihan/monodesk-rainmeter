[Rainmeter]
; Update=-1 : skin statis tanpa siklus update -> nyaris 0% CPU
; (klik item tetap jalan karena memicu update manual)
Update=-1
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]
LeftMouseDoubleClickAction=[!Refresh]

[Metadata]
Name=MonoDesk TodoList
Author=Rasyihan
Information=Daftar tugas. Klik item untuk mencoret/batal. Klik EDIT untuk mengubah daftar. Dobel-klik area kosong untuk refresh.
Version=2.0

[Variables]
@include=#@#Variables.inc
@include2=#@#Todo.inc
; ================================================================
; ATUR UKURAN WIDGET TO-DO DI SINI
; Scale       : zoom keseluruhan (scroll mouse di widget juga bisa)
; LebarSkala  : melebarkan/menyempitkan kotak (1.0 = normal, 1.3 = lebih lebar)
; TinggiSkala : meninggikan/memendekkan kotak (1.0 = normal, 1.3 = lebih tinggi)
; ================================================================
Scale=1.0
LebarSkala=1.0
TinggiSkala=1.0

;-------------------------------------------------------------
; MEASURES - status selesai tiap item (mengatur warna & centang)
;-------------------------------------------------------------

[MeasureDone1]
Measure=Calc
Formula=#Done1#
DynamicVariables=1
IfCondition=MeasureDone1 = 1
IfTrueAction=[!SetOption MeterCheck1 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 255,255,255,235 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo1 FontColor "255,255,255,80"][!UpdateMeter MeterCheck1][!UpdateMeter MeterTodo1][!Redraw]
IfFalseAction=[!SetOption MeterCheck1 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo1 FontColor "#FontColor#"][!UpdateMeter MeterCheck1][!UpdateMeter MeterTodo1][!Redraw]

[MeasureDone2]
Measure=Calc
Formula=#Done2#
DynamicVariables=1
IfCondition=MeasureDone2 = 1
IfTrueAction=[!SetOption MeterCheck2 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 255,255,255,235 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo2 FontColor "255,255,255,80"][!UpdateMeter MeterCheck2][!UpdateMeter MeterTodo2][!Redraw]
IfFalseAction=[!SetOption MeterCheck2 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo2 FontColor "#FontColor#"][!UpdateMeter MeterCheck2][!UpdateMeter MeterTodo2][!Redraw]

[MeasureDone3]
Measure=Calc
Formula=#Done3#
DynamicVariables=1
IfCondition=MeasureDone3 = 1
IfTrueAction=[!SetOption MeterCheck3 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 255,255,255,235 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo3 FontColor "255,255,255,80"][!UpdateMeter MeterCheck3][!UpdateMeter MeterTodo3][!Redraw]
IfFalseAction=[!SetOption MeterCheck3 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo3 FontColor "#FontColor#"][!UpdateMeter MeterCheck3][!UpdateMeter MeterTodo3][!Redraw]

[MeasureDone4]
