IfFalseAction=[!SetOption MeterCheck5 Shape "Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#"][!SetOption MeterTodo5 FontColor "#FontColor#"][!UpdateMeter MeterCheck5][!UpdateMeter MeterTodo5][!Redraw]

;-------------------------------------------------------------
; METERS - BINGKAI & JUDUL
;-------------------------------------------------------------

[MeterBox]
Meter=Shape
X=0
Y=(18*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(260*#Scale#*#LebarSkala#),(230*#Scale#*#TinggiSkala#),(12*#Scale#) | Fill Color #BoxColor# | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTab]
Meter=Shape
X=(20*#Scale#*#LebarSkala#)
Y=0
Shape=Rectangle 0,0,(100*#Scale#*#LebarSkala#),(36*#Scale#*#TinggiSkala#),(9*#Scale#) | Fill Color 8,8,8,255 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTitle]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(70*#Scale#*#LebarSkala#)
Y=(7*#Scale#*#TinggiSkala#)
Text="TO-DO"
AntiAlias=1
UpdateDivider=-1

[MeterEdit]
Meter=String
StringAlign=Right
FontFace=#FontName#
FontWeight=600
FontColor=#FontColorDim#
FontSize=(10*#Scale#)
X=(240*#Scale#*#LebarSkala#)
Y=(30*#Scale#*#TinggiSkala#)
Text="EDIT"
AntiAlias=1
LeftMouseUpAction=["notepad.exe" "#@#Todo.inc"]
MouseOverAction=[!SetOption MeterEdit FontColor "255,255,255,255"][!UpdateMeter MeterEdit][!Redraw]
MouseLeaveAction=[!SetOption MeterEdit FontColor "#FontColorDim#"][!UpdateMeter MeterEdit][!Redraw]

;-------------------------------------------------------------
; METERS - ITEM TUGAS (klik = coret / batal coret)
;-------------------------------------------------------------

[MeterCheck1]
Meter=Shape
X=(22*#Scale#*#LebarSkala#)
Y=(56*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(15*#Scale#*#LebarSkala#),(15*#Scale#*#TinggiSkala#),(3*#Scale#) | Fill Color 0,0,0,1 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
DynamicVariables=1
LeftMouseUpAction=[!SetVariable Done1 "(1-#Done1#)"][!WriteKeyValue Variables Done1 "(1-#Done1#)" "#@#Todo.inc"][!UpdateMeasure MeasureDone1]

[MeterTodo1]
