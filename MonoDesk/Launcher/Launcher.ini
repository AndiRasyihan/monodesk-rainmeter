[Rainmeter]
; Update=-1 : skin statis tanpa siklus update -> nyaris 0% CPU
; (hover & klik tetap jalan karena digerakkan event mouse)
Update=-1
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh]
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.3 ? 0.3 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]

[Metadata]
Name=MonoDesk Launcher
Author=Rasyihan
Information=Grid ikon shortcut aplikasi. Klik ikon untuk membuka. Ganti daftar di @Resources\Variables.inc lalu jalankan make_icons.ps1.
Version=3.0

[Variables]
@include=#@#Variables.inc
; ================================================================
; ATUR UKURAN WIDGET LAUNCHER DI SINI
; Scale       : zoom keseluruhan (scroll mouse di widget juga bisa)
; LebarSkala  : melebarkan/menyempitkan kotak (1.0 = normal, 1.3 = lebih lebar)
; TinggiSkala : meninggikan/memendekkan kotak (1.0 = normal, 1.3 = lebih tinggi)
; ================================================================
Scale=1.0
LebarSkala=1.0
TinggiSkala=1.0

;-------------------------------------------------------------
; METERS - BINGKAI & JUDUL
;-------------------------------------------------------------

[MeterBox]
Meter=Shape
X=0
Y=(18*#Scale#*#TinggiSkala#)
Shape=Rectangle 0,0,(240*#Scale#*#LebarSkala#),(205*#Scale#*#TinggiSkala#),(12*#Scale#) | Fill Color #BoxColor# | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTab]
Meter=Shape
X=(20*#Scale#*#LebarSkala#)
Y=0
Shape=Rectangle 0,0,(90*#Scale#*#LebarSkala#),(36*#Scale#*#TinggiSkala#),(9*#Scale#) | Fill Color 8,8,8,255 | StrokeWidth (2*#Scale#) | Stroke Color #BoxStroke#
UpdateDivider=-1

[MeterTitle]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=700
FontColor=#FontColor#
FontSize=(13*#Scale#)
X=(65*#Scale#*#LebarSkala#)
Y=(7*#Scale#*#TinggiSkala#)
Text="APPS"
AntiAlias=1
UpdateDivider=-1

;-------------------------------------------------------------
; METERS - GRID IKON (baris 1)
; Ikon dihasilkan otomatis oleh make_icons.ps1 -> @Resources\Icons\
;-------------------------------------------------------------

[MeterIcon1]
Meter=Image
ImageName=#@#Icons\App1.png
X=(31*#Scale#*#LebarSkala#)
Y=(54*#Scale#*#TinggiSkala#)
W=(44*#Scale#*#LebarSkala#)
H=(44*#Scale#*#TinggiSkala#)
PreserveAspectRatio=1
LeftMouseUpAction=["#App1Path#"]
ToolTipText=#App1Name#

[MeterLabel1]
Meter=String
StringAlign=Center
FontFace=#FontName#
FontWeight=400
FontColor=#FontColorDim#
FontSize=(10*#Scale#)
X=(53*#Scale#*#LebarSkala#)
Y=(104*#Scale#*#TinggiSkala#)
W=(64*#Scale#*#LebarSkala#)
ClipString=1
Text="#App1Name#"
AntiAlias=1
LeftMouseUpAction=["#App1Path#"]
MouseOverAction=[!SetOption MeterLabel1 FontColor "255,255,255,255"][!UpdateMeter MeterLabel1][!Redraw]
MouseLeaveAction=[!SetOption MeterLabel1 FontColor "#FontColorDim#"][!UpdateMeter MeterLabel1][!Redraw]

